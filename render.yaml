services:
  - type: web
    name: rope-skipping-system
    runtime: node
    plan: free
    buildCommand: npm install && cd admin-frontend && npm install && npm run build && cd ../registration-frontend && npm install && npm run build && cd .. && cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
